<head>

<title>Idiomatic Expressions — Complete Collection 1–148</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --ink: #1A1612;
    --muted: #7A7168;
    --accent: #C8521A;
    --border: #E2DDD6;
    --card-bg: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; padding: 40px 24px 80px; }

  header {
    max-width: 1040px; margin: 0 auto 40px;
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 1.5px solid var(--ink); padding-bottom: 20px; gap: 24px; flex-wrap: wrap;
  }
  .header-left h1 { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 600; line-height: 1.1; }
  .header-left p { font-size: 12px; color: var(--muted); margin-top: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  .header-right { display: flex; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 9px 18px; border-radius: 6px; cursor: pointer;
    transition: all .18s; border: 1.5px solid var(--ink); background: transparent; color: var(--ink);
  }
  .btn:hover { background: var(--ink); color: #fff; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #a64215; border-color: #a64215; color: #fff; }

  .toolbar { max-width: 1040px; margin: 0 auto 18px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 220px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #search {
    width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 9px 12px 9px 36px; border: 1.5px solid var(--border); border-radius: 6px;
    background: var(--card-bg); color: var(--ink); outline: none; transition: border-color .15s;
  }
  #search:focus { border-color: var(--accent); }

  .tabs { max-width: 1040px; margin: 0 auto 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tab {
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    padding: 5px 14px; border-radius: 999px; border: 1.5px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; transition: all .15s;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab:hover:not(.active) { border-color: var(--ink); color: var(--ink); }

  .cats { max-width: 1040px; margin: 0 auto 20px; display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-btn {
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    padding: 4px 12px; border-radius: 999px; border: 1.5px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; transition: all .15s;
  }
  .cat-btn.active { border-color: currentColor; }
  .cat-btn:hover { border-color: var(--ink); color: var(--ink); }

  .count { max-width: 1040px; margin: 0 auto 14px; font-size: 12px; color: var(--muted); }

  .grid {
    max-width: 1040px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px;
  }

  .card {
    background: var(--card-bg); border: 1.5px solid var(--border);
    border-radius: 12px; overflow: hidden;
    transition: transform .18s, box-shadow .18s;
    animation: fadein .28s ease both;
  }
  @keyframes fadein { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.07); }

  .card-stripe { height: 4px; }
  .card-body { padding: 16px 16px 12px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
  .card-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .num { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.06em; white-space: nowrap; margin-top: 2px; }

  .type-badge {
    font-size: 9px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 999px; white-space: nowrap;
  }
  .type-idiom    { background: #EEF2FF; color: #3730A3; }
  .type-proverb  { background: #F0FDF4; color: #166534; }
  .type-phrase   { background: #FFF7ED; color: #9A3412; }
  .type-slang    { background: #FDF2F8; color: #831843; }

  .cat-badge {
    font-size: 10px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }

  .expression-title {
    font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600;
    line-height: 1.35; color: var(--ink); margin-bottom: 7px;
  }
  .meaning { font-size: 13px; color: #4A4540; line-height: 1.55; margin-bottom: 10px; }
  .example-block {
    background: var(--cream); border-left: 2.5px solid var(--border);
    padding: 7px 11px; border-radius: 0 5px 5px 0;
    font-size: 12px; font-style: italic; color: var(--muted); line-height: 1.5;
  }

  .empty { max-width: 1040px; margin: 48px auto; text-align: center; color: var(--muted); font-size: 15px; }

  .legend { max-width: 1040px; margin: 0 auto 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  @media print {
    body { background: #fff; padding: 16px; }
    header { margin-bottom: 20px; }
    .header-right, .toolbar, .tabs, .cats, .count, .legend { display: none; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .card { break-inside: avoid; box-shadow: none !important; transform: none !important; border: 1px solid #ddd; }
  }
</style>
</head>

const TYPES = ['All','idiom','proverb','phrase','slang'];
const CATS  = ['All',...[...new Set(DATA.map(d=>d.cat))].sort()];
let activeType = 'All';
let activeCat  = 'All';

function renderTypeTabs(){
  document.getElementById('type-tabs').innerHTML = TYPES.map(t=>`
    <button class="tab ${t===activeType?'active':''}" onclick="setType('${t}')">
      ${t==='All'?'All Types':t.charAt(0).toUpperCase()+t.slice(1)+'s'}
      <span style="opacity:.6;font-size:10px">(${t==='All'?DATA.length:DATA.filter(d=>d.type===t).length})</span>
    </button>`).join('');
}

function renderCatTabs(){
  document.getElementById('cat-tabs').innerHTML = CATS.map(c=>`
    <button class="cat-btn ${c===activeCat?'active':''}" onclick="setCat('${c}')"
      style="${c===activeCat?'border-color:var(--accent);color:var(--accent)':''}"
    >${c}</button>`).join('');
}

function setType(t){ activeType=t; activeCat='All'; renderTypeTabs(); renderCatTabs(); render(); }
function setCat(c){ activeCat=c; renderCatTabs(); render(); }

function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const list = DATA.filter(d=>
    (activeType==='All'||d.type===activeType)&&
    (activeCat==='All'||d.cat===activeCat)&&
    (!q||d.expr.toLowerCase().includes(q)||d.meaning.toLowerCase().includes(q)||d.cat.toLowerCase().includes(q))
  );
  document.getElementById('count').textContent=`Showing ${list.length} of ${DATA.length} expressions`;
  document.getElementById('empty').style.display=list.length?'none':'block';
  document.getElementById('grid').innerHTML=list.map((d,i)=>`
    <div class="card" style="animation-delay:${Math.min(i,20)*30}ms">
      <div class="card-stripe" style="background:${d.stripe}"></div>
      <div class="card-body">
        <div class="card-top">
          <span class="num">#${String(d.n).padStart(3,'0')}</span>
          <div class="card-meta">
            <span class="type-badge type-${d.type}">${d.type}</span>
            <span class="cat-badge" style="background:${d.bb};color:${d.bt}">${d.cat}</span>
          </div>
        </div>
        <div class="expression-title">"${d.expr}"</div>
        <div class="meaning">${d.meaning}</div>
        <div class="example-block">${d.example}</div>
      </div>
    </div>`).join('');
}

function downloadHTML(){
  const blob=new Blob([document.documentElement.outerHTML],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='idiom_expressions_complete_1-148.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

renderTypeTabs(); renderCatTabs(); render();
</script>
