<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdiomVault — Flashcards Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-logo">IdiomVault <span>by BODY</span></div>
  <div class="nav-links">
    <a href="index.html"    class="nav-link active"><span class="nl-icon">🃏</span><span class="nl-text">Cards</span></a>
    <a href="quiz.html"     class="nav-link"><span class="nl-icon">⚡</span><span class="nl-text">Quiz</span></a>
    <a href="review.html"   class="nav-link"><span class="nl-icon">🔁</span><span class="nl-text">Review</span></a>
    <a href="progress.html" class="nav-link"><span class="nl-icon">📊</span><span class="nl-text">Progress</span></a>
    <a href="challenge.html" class="nav-link"><span class="nl-icon">🧠</span><span class="nl-text">Challenge</span></a>
  </div>
  <div class="nav-xp">
    <div class="streak-pill">🔥 <span id="navStreak">0</span></div>
    <div class="xp-pill">⭐ <span id="navXP">0 XP</span></div>
  </div>
</nav>

<div class="xp-pop" id="xpPop">+10 XP</div>
<div class="toast" id="toast"></div>

<div class="page">
  <div class="container">

    <div class="page-hero">
      <h1 class="page-hero-title"><em>Flashcard</em> Pro</h1>
      <p class="page-hero-sub">Use <kbd>U</kbd> or <kbd>B</kbd> for Audio | <kbd>Space</kbd> to Flip</p>
    </div>

    <div class="stat-strip">
      <div class="stat-item">
        <span class="stat-val" id="statTotal">198</span>
        <span class="stat-lbl">Total</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="statLearned">0</span>
        <span class="stat-lbl">Learned</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="statPct">0%</span>
        <span class="stat-lbl">Progress</span>
      </div>
    </div>

    <div class="flashcard-wrap" style="margin-top: 30px;">
        <div class="card-container" id="cardContainer">
            <div class="card-inner" id="cardInner">
                <div class="card-front">
                    <div class="card-meta-row">
                        <span class="card-num" id="cardNum">#001</span>
                        <span class="type-badge" id="cardType">IDIOM</span>
                    </div>
                    <div class="card-expr" id="cardExpr">Loading…</div>
                    <div class="card-tap-hint">
                        <span>👆</span> Tap or <kbd>Space</kbd> to reveal
                    </div>
                </div>
                <div class="card-back">
                    <div class="meaning-label">Meaning</div>
                    <div class="meaning-text" id="cardMeaning">...</div>
                    <div class="meaning-label" style="margin-top:16px;">Example</div>
                    <div class="example-text" id="cardExample">...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-pro">
        <div class="audio-buttons">
            <button id="audioUSBtn" class="btn-audio">🇺🇸 US (U)</button>
            <button id="audioUKBtn" class="btn-audio">🇬🇧 UK (B)</button>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-ghost" onclick="prevCard()">← Prev</button>
            <button class="btn btn-ghost" id="randomBtn">🎲 Random (R)</button>
            <button class="btn btn-ghost" onclick="nextCard()">Next →</button>
        </div>

        <button class="btn btn-correct btn-lg" id="knowBtn" style="width:100%; margin-top:15px;">
            ✓ I Know This (K)
        </button>
    </div>

  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
