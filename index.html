<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdiomVault — Premium Flashcards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="onboarding" class="onboarding-overlay" style="display:none;">
    <div class="onboarding-card">
        <h2 class="fraunces">Welcome to <em>IdiomVault</em></h2>
        <p>How should we call you, Scholar?</p>
        <input type="text" id="userNameInput" placeholder="Enter your name..." maxlength="15">
        <button class="btn btn-correct btn-lg" style="width:100%" onclick="saveUser()">Start My Journey</button>
    </div>
</div>

<nav class="nav">
  <div class="nav-logo">IdiomVault <span>by BODY</span></div>
  <div class="nav-links">
    <a href="index.html"    class="nav-link active"><span class="nl-icon">🃏</span><span class="nl-text">Cards</span></a>
    <a href="quiz.html"     class="nav-link"><span class="nl-icon">⚡</span><span class="nl-text">Quiz</span></a>
    <a href="review.html"   class="nav-link"><span class="nl-icon">🔁</span><span class="nl-text">Review</span></a>
    <a href="progress.html" class="nav-link"><span class="nl-icon">📊</span><span class="nl-text">Progress</span></a>
  </div>
  <div class="nav-xp">
    <div class="streak-pill" id="navStreak">🔥 0</div>
    <div class="xp-pill" id="navXP">⭐ 0 XP</div>
  </div>
</nav>

<div class="xp-pop" id="xpPop">+10 XP</div>
<div class="toast" id="toast"></div>

<div class="page">
  <div class="container">

    <div class="page-hero">
      <h1 class="page-hero-title" id="welcomeText">Welcome, <em>Scholar</em></h1>
      <p class="page-hero-sub">Tap card to reveal | Key shortcuts enabled</p>
    </div>

    <div class="stat-strip">
      <div class="stat-item"><span class="stat-val" id="statTotal">0</span><span class="stat-lbl">Total</span></div>
      <div class="stat-item"><span class="stat-val" id="statLearned">0</span><span class="stat-lbl">Learned</span></div>
      <div class="stat-item"><span class="stat-val" id="statDifficult">0</span><span class="stat-lbl">Review</span></div>
      <div class="stat-item"><span class="stat-val" id="statPct">0%</span><span class="stat-lbl">Done</span></div>
    </div>

    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab on" data-type="All">All</button>
      <button class="filter-tab" data-type="luck">🍀 Luck</button>
      <button class="filter-tab" data-type="character">👤 Character</button>
      <button class="filter-tab" data-type="bad">⚠️ Bad</button>
      <button class="filter-tab" data-type="fate">🌌 Fate</button>
    </div>

    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="revealCard()">
        <div class="card-top-bar" id="cardBar"></div>
        <div class="card-inner">
          <div class="card-meta-row">
            <span class="card-num" id="cardNum">#000</span>
            <span class="type-badge" id="cardType">Type</span>
          </div>
          <div class="card-expr" id="cardExpr">Loading expression...</div>
          <div class="card-tap-hint" id="tapHint"><span>👆</span> Tap to reveal meaning</div>

          <div class="card-revealed" id="cardRevealed">
            <div class="card-divider"><div class="card-divider-line"></div><div class="card-divider-dot"></div><div class="card-divider-line"></div></div>
            <div class="meaning-label">Meaning</div>
            <div class="meaning-text" id="cardMeaning"></div>
            <div class="meaning-label" style="margin-top:16px;">Example</div>
            <div class="example-text" id="cardExample"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="audio-bar">
      <button class="btn-audio-lg" onclick="playFullAudio()"><span>🇺🇸</span> Full Read <kbd>U</kbd></button>
      <button class="btn-audio-lg" onclick="shareCard()"><span>📤</span> Share</button>
    </div>

    <div class="card-actions" id="cardActions" style="display:none; margin-bottom: 12px;">
      <button class="btn btn-correct btn-lg" onclick="markKnown()">✓ I Know This <kbd>K</kbd></button>
      <button class="btn btn-wrong btn-lg"   onclick="markDifficult()">↩ Review Again</button>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:48px;">
      <button class="btn btn-ghost" onclick="prevCard()">← Prev</button>
      <button class="btn btn-ghost" id="btnRandom" onclick="randomCard()">🎲 Random <kbd>R</kbd></button>
      <button class="btn btn-ghost" onclick="nextCard()">Next →</button>
    </div>

  </div>
</div>

<script src="data.js"></script>
<script>
/* ── STATE MANAGEMENT ── */
let state = {
  learned: new Set(),
  difficult: new Set(),
  xp: 0,
  streak: 0,
  lastDate: null
};

// Load state from LocalStorage
function loadState() {
  const saved = localStorage.getItem('iv_state');
  if (saved) {
    const parsed = JSON.parse(saved);
    state.learned = new Set(parsed.learned || []);
    state.difficult = new Set(parsed.difficult || []);
    state.xp = parsed.xp || 0;
    state.streak = parsed.streak || 0;
  }
}

function saveState() {
  const toSave = {
    learned: Array.from(state.learned),
    difficult: Array.from(state.difficult),
    xp: state.xp,
    streak: state.streak
  };
  localStorage.setItem('iv_state', JSON.stringify(toSave));
}

/* ── ONBOARDING & USER ── */
function checkUser() {
    const name = localStorage.getItem('iv_name');
    if (!name) {
        document.getElementById('onboarding').style.display = 'flex';
    } else {
        document.getElementById('welcomeText').innerHTML = `Keep going, <em>${name}</em>!`;
    }
}

function saveUser() {
    const nameInput = document.getElementById('userNameInput').value;
    if (nameInput.trim() !== "") {
        localStorage.setItem('iv_name', nameInput);
        document.getElementById('onboarding').style.display = 'none';
        checkUser();
        showToast(`Welcome, ${nameInput}!`);
    }
}

/* ── CORE ENGINE ── */
let deck = [...DATA];
let deckIdx = 0;
let revealed = false;
let activeFilter = 'All';

function init() {
  loadState();
  checkUser();
  applyFilter();
  renderCard();
  renderStats();
  renderNav();
}

function applyFilter() {
  if (activeFilter === 'All') {
    deck = [...DATA];
  } else {
    // Filter by Type OR by Theme
    deck = DATA.filter(d => d.type === activeFilter || d.theme === activeFilter);
  }
  deckIdx = 0;
  if (deck.length === 0) {
      document.getElementById('cardExpr').textContent = "No cards found in this category.";
  }
}

function renderCard() {
  if (deck.length === 0) return;
  revealed = false;
  const d = deck[deckIdx];
  
  document.getElementById('cardNum').textContent = '#' + String(d.n).padStart(3, '0');
  document.getElementById('cardType').textContent = d.type;
  document.getElementById('cardExpr').textContent = `"${d.expr}"`;
  document.getElementById('cardMeaning').textContent = d.meaning;
  document.getElementById('cardExample').textContent = d.example;
  
  // Reset UI
  document.getElementById('cardRevealed').classList.remove('show');
  document.getElementById('tapHint').style.display = 'flex';
  document.getElementById('cardActions').style.display = 'none';
  
  const fc = document.getElementById('flashcard');
  fc.classList.remove('anim-popin');
  void fc.offsetWidth; // Trigger reflow
  fc.classList.add('anim-popin');
}

function revealCard() {
  if (revealed) return;
  revealed = true;
  document.getElementById('cardRevealed').classList.add('show');
  document.getElementById('tapHint').style.display = 'none';
  document.getElementById('cardActions').style.display = 'grid';
}

/* ── AUDIO ENGINE ── */
function playFullAudio() {
    const d = deck[deckIdx];
    if (!d) return;
    
    window.speechSynthesis.cancel();
    
    const readExpr = new SpeechSynthesisUtterance(d.expr);
    readExpr.lang = 'en-US';
    readExpr.rate = 0.85;

    const readMeaning = new SpeechSynthesisUtterance("Meaning: " + d.meaning);
    readMeaning.lang = 'en-US';
    readMeaning.rate = 0.9;

    const readExample = new SpeechSynthesisUtterance("Example: " + d.example);
    readExample.lang = 'en-GB'; 

    window.speechSynthesis.speak(readExpr);
    window.speechSynthesis.speak(readMeaning);
    window.speechSynthesis.speak(readExample);
}

/* ── SHARING ── */
function shareCard() {
    const d = deck[deckIdx];
    if (navigator.share) {
        navigator.share({
            title: 'IdiomVault - Learn English',
            text: `Check out this expression: "${d.expr}"\nMeaning: ${d.meaning}`,
            url: window.location.href
        }).catch(console.error);
    } else {
        showToast("Sharing not supported on this browser.");
    }
}

/* ── ACTIONS ── */
function nextCard() { deckIdx = (deckIdx + 1) % deck.length; renderCard(); }
function prevCard() { deckIdx = (deckIdx - 1 + deck.length) % deck.length; renderCard(); }

function randomCard() {
    const btn = document.getElementById('btnRandom');
    btn.classList.add('random-active');
    setTimeout(() => btn.classList.remove('random-active'), 400);
    
    deckIdx = Math.floor(Math.random() * deck.length);
    renderCard();
}

function markKnown() {
  const d = deck[deckIdx];
  if (!state.learned.has(d.n)) {
    state.learned.add(d.n);
    state.xp += 10;
    showXpPop('+10 XP');
  }
  state.difficult.delete(d.n);
  saveState();
  renderStats();
  renderNav();
  showToast("Mastered!");
  setTimeout(nextCard, 500);
}

function markDifficult() {
  const d = deck[deckIdx];
  state.difficult.add(d.n);
  state.learned.delete(d.n);
  saveState();
  renderStats();
  showToast("Added to Review");
  setTimeout(nextCard, 500);
}

/* ── UI HELPERS ── */
function renderStats() {
  document.getElementById('statTotal').textContent = DATA.length;
  document.getElementById('statLearned').textContent = state.learned.size;
  document.getElementById('statDifficult').textContent = state.difficult.size;
  const pct = Math.round((state.learned.size / DATA.length) * 100);
  document.getElementById('statPct').textContent = pct + '%';
}

function renderNav() {
  document.getElementById('navStreak').textContent = '🔥 ' + state.streak;
  document.getElementById('navXP').textContent = '⭐ ' + state.xp + ' XP';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function showXpPop(msg) {
  const el = document.getElementById('xpPop');
  el.textContent = msg;
  el.classList.remove('fly');
  void el.offsetWidth;
  el.classList.add('fly');
}

// Filter Clicks
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter = btn.dataset.type;
    applyFilter();
    renderCard();
  });
});

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowright' || k === ' ') { e.preventDefault(); revealed ? nextCard() : revealCard(); }
  if (k === 'arrowleft') prevCard();
  if (k === 'u') playFullAudio();
  if (k === 'r') randomCard();
  if (k === 'k' && revealed) markKnown();
});

window.onload = init;
</script>
</body>
</html>
